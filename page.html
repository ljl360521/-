<script>
    const webUrl = "https:\/\/qyun.org";
    const token = "5k4z9g";
    const fileId = 902493;
    const downloadHosts = [{"id":1,"host":"d6.qyshare.click","seq":0,"type":0,"status":1,"info":""},{"id":2,"host":"d2.qyshare.click","seq":0,"type":0,"status":1,"info":""},{"id":3,"host":"d3.qyshare.click","seq":0,"type":0,"status":1,"info":""},{"id":7,"host":"d1.qyshare.click","seq":0,"type":0,"status":1,"info":""},{"id":10,"host":"d4.qyshare.click","seq":0,"type":0,"status":1,"info":""},{"id":11,"host":"d5.qyshare.click","seq":0,"type":0,"status":1,"info":""},{"id":14,"host":"d2.qyshare.click","seq":0,"type":0,"status":1,"info":null}];
    const backupDownloadHosts = [{"id":4,"host":"d6.qyshare.click:2083","seq":0,"type":1,"status":1,"info":""},{"id":5,"host":"d1.qyshare.click:2083","seq":0,"type":1,"status":1,"info":""},{"id":6,"host":"d2.qyshare.click","seq":0,"type":1,"status":1,"info":""},{"id":8,"host":"d3.qyshare.click:2083","seq":0,"type":1,"status":1,"info":""},{"id":9,"host":"d4.qyshare.click:2083","seq":0,"type":1,"status":1,"info":""},{"id":12,"host":"d5.qyshare.click:2083","seq":0,"type":1,"status":1,"info":""},{"id":13,"host":"d2.qyshare.click:2083","seq":0,"type":1,"status":1,"info":null}];
    const fileExtension = "zip";
    // 支持在线播放的扩展名
    const videoExtensions = ['mp4', 'webm', 'ogg', 'mov', 'm4v', '3gp', 'avi', 'flv', 'mkv'];

    const HOST_CACHE_KEY = 'lark_share_host';
    const BACKUP_HOST_CACHE_KEY = 'lark_share_backup_host';
    const HOST_CACHE_TTL = 5 * 60 * 1000; // 5分钟

    function getCachedHost(key) {
        try {
            const cached = sessionStorage.getItem(key);
            if (!cached) return null;
            const { hostId, expireAt } = JSON.parse(cached);
            if (Date.now() > expireAt) {
                sessionStorage.removeItem(key);
                return null;
            }
            return hostId;
        } catch (e) {
            return null;
        }
    }

    function setCachedHost(key, hostId) {
        try {
            sessionStorage.setItem(key, JSON.stringify({ hostId, expireAt: Date.now() + HOST_CACHE_TTL }));
        } catch (e) {}
    }

    // 提取主机可用性测试逻辑
    function testHostAvailability(host) {
        return new Promise((resolve) => {
            const img = new Image();
            const timeout = setTimeout(() => {
                img.onload = img.onerror = null;
                resolve(false);
            }, 5000);

            img.onload = () => {
                clearTimeout(timeout);
                resolve(true);
            };
            img.onerror = () => {
                clearTimeout(timeout);
                resolve(false);
            };
            // 判断host是否为IP，IP用http，域名用https
            let protocol = /^(\d{1,3}\.){3}\d{1,3}$/.test(host) ? 'http' : 'https';
            img.src = `${protocol}://${host}/ping?ts=${Date.now()}`;
        });
    }

    // 逐条测试host列表，返回第一个可用的hostId，同时缓存结果
    async function findAvailableHost(hosts, cacheKey) {
        // 缓存命中
        const cachedHostId = getCachedHost(cacheKey);
        if (cachedHostId) return cachedHostId;

        // 逐条测试
        for (let i = 0; i < hosts.length; i++) {
            const hostObj = hosts[i];
            try {
                const ok = await testHostAvailability(hostObj.host);
                if (ok) {
                    setCachedHost(cacheKey, hostObj.id);
                    return hostObj.id;
                }
            } catch (e) {}
        }
        return null;
    }

    function buildDownloadUrl(hostId) {
        let url = `/api/share/download?token=${encodeURIComponent(token)}&fileId=${encodeURIComponent(fileId)}`;
        if (hostId) url += `&hostId=${encodeURIComponent(hostId)}`;
        return url;
    }

    async function startDownload() {
        const btn = document.getElementById('downloadBtn');
        const text = document.getElementById('downloadText');
        const spinner = document.getElementById('loadingSpinner');
        const backupBtn = document.getElementById('backupDownloadBtn');

        btn.classList.add('loading');
        text.style.display = 'none';
        spinner.style.display = 'block';

        const hostId = await findAvailableHost(downloadHosts, HOST_CACHE_KEY);
        if (hostId) {
            window.location.href = buildDownloadUrl(hostId);
        } else {
            showPasswordError('所有下载服务器暂时不可用，请稍后重试');
        }
        resetDownloadButton();

        // 显示备用按钮
        backupBtn.style.display = 'block';
    }

    async function startBackupDownload() {
        const btn = document.getElementById('backupDownloadBtn');
        const text = document.getElementById('backupDownloadText');
        const spinner = document.getElementById('backupLoadingSpinner');

        btn.classList.add('loading');
        text.style.display = 'none';
        spinner.style.display = 'block';

        const hostId = await findAvailableHost(backupDownloadHosts, BACKUP_HOST_CACHE_KEY);
        if (hostId) {
            window.location.href = buildDownloadUrl(hostId);
        } else {
            showPasswordError('所有下载服务器暂时不可用，请稍后重试');
        }
        resetBackupDownloadButton();
    }

    async function selectHostAndGetUrl() {
        // 先尝试主下载服务器
        const hostId = await findAvailableHost(downloadHosts, HOST_CACHE_KEY);
        if (hostId) return buildDownloadUrl(hostId);

        // 主服务器不可用，尝试备用服务器
        const backupHostId = await findAvailableHost(backupDownloadHosts, BACKUP_HOST_CACHE_KEY);
        if (backupHostId) return buildDownloadUrl(backupHostId);

        // fallback
        return buildDownloadUrl(null);
    }

    function resetDownloadButton() {
        const btn = document.getElementById('downloadBtn');
        const text = document.getElementById('downloadText');
        const spinner = document.getElementById('loadingSpinner');
        btn.classList.remove('loading');
        text.style.display = 'block';
        spinner.style.display = 'none';
        text.textContent = '立即下载';
    }

    function resetBackupDownloadButton() {
        const btn = document.getElementById('backupDownloadBtn');
        const text = document.getElementById('backupDownloadText');
        const spinner = document.getElementById('backupLoadingSpinner');
        btn.classList.remove('loading');
        text.style.display = 'block';
        spinner.style.display = 'none';
        text.textContent = '无法下载？点我备用下载';
    }

    async function startVideoPlay() {
        const btn = document.getElementById('videoPlayBtn');
        const text = document.getElementById('videoPlayText');
        const spinner = document.getElementById('videoLoadingSpinner');
        btn.classList.add('loading');
        text.style.display = 'none';
        spinner.style.display = 'block';
        text.textContent = '准备播放...';

        const url = await selectHostAndGetUrl();
        document.getElementById('videoSource').src = url;
        document.getElementById('videoPlayer').load();
        document.getElementById('videoPlayerWrapper').style.display = 'block';

        btn.classList.remove('loading');
        text.style.display = 'block';
        spinner.style.display = 'none';
        text.textContent = '在线播放';
        // 自动滚动到播放器
        setTimeout(() => {
            document.getElementById('videoPlayerWrapper').scrollIntoView({behavior: 'smooth'});
        }, 200);
    }

    document.addEventListener('DOMContentLoaded', () => {
        const hasPassword = false;
        if (hasPassword) {
            document.getElementById('downloadSection').style.display = 'none';
        } else {
            // 判断是否为可播放视频
            if (videoExtensions.includes(fileExtension.toLowerCase())) {
                document.getElementById('videoPlayBtnWrapper').style.display = 'block';
                document.getElementById('videoPlayBtn').onclick = startVideoPlay;
            }
        }
    });

    document.getElementById('saveToCloudBtn').onclick = function() {
        const param = {
            token: token,
            fileId: fileId,
            password: getCookie("share_passed_" + token) || '',
        };
        const base64 = btoa(unescape(encodeURIComponent(JSON.stringify(param))));
        window.location.href = webUrl + '/files.html?save_param=' + encodeURIComponent(base64);
    };

    function checkPassword() {
        const password = document.getElementById('passwordInput').value.trim();
        const errorDiv = document.getElementById('passwordError');

        if (!password) {
            showPasswordError('请输入访问密码');
            return;
        }

        fetch('/api/share/check-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: `token=${encodeURIComponent(token)}&password=${encodeURIComponent(password)}`
        })
            .then(res => res.json())
            .then(response => {
                if (response.success) {
                    setCookie("share_passed_" + token, password);
                    window.location.reload();
                } else {
                    showPasswordError(response.message || '密码错误，请重试');
                }
            })
            .catch(() => showPasswordError('网络错误，请稍后重试'));
    }

    function showPasswordError(message) {
        const errorDiv = document.getElementById('passwordError');
        errorDiv.textContent = message;
        errorDiv.style.display = 'block';
        setTimeout(() => {
            errorDiv.style.display = 'none';
        }, 3000);
    }

    // 回车键提交密码
    document.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && document.getElementById('passwordInput') === document.activeElement) {
            checkPassword();
        }
    });
</script>
</body>
